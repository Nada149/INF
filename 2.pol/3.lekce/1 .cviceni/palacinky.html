<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>palacinky</title>
</head>
<body>
    <h1>palacinky</h1>
    <h2>ingredience</h2>
    <ul>
        <li>250ml mleka</li>
        <li>100-120g hladke mouky</li>
        <li>2 vejce</li>
        <li> 1 sacek vanilkovy cukr</li>
        <li>spetka soli</li>
        <li>2 lzice rozpusteneho masla</li>
        <li>olej</li>
    </ul>
    <h2>postup</h2>
    <ol>
        <li>smichejte suche prisady</li>
        <li>pridejte mleko a vejce</li>
        <li>rozmixujte do hladka</li>
        <li>smazte na panvi dozlatova</li>
    </ol>
 
</body>
</html>
